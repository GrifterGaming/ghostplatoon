<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ghost Platoon — Recruitment Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#1a1a18;
  --surface:#222220;
  --card:#2a2a28;
  --card2:#323230;
  --red:#bf2048;
  --red-dim:rgba(191,32,72,0.18);
  --tan:#d4c4a4;
  --light:#e8e8e8;
  --muted:#6e6d67;
  --border:rgba(212,196,164,0.1);
  --green:#5cb85c;
  --green-dim:rgba(92,184,92,0.15);
}
body{background:var(--bg);color:var(--light);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;min-height:100vh;}

.setup-banner{background:rgba(191,32,72,0.15);border-bottom:1px solid rgba(191,32,72,0.4);padding:12px 24px;font-size:12px;color:#f07080;display:none;}
.setup-banner code{background:rgba(0,0,0,0.3);padding:2px 6px;border-radius:3px;font-family:monospace;}

.nav{background:var(--surface);border-bottom:2px solid var(--red);height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:100;}
.nav-brand{display:flex;align-items:center;gap:10px;}
.nav-icon{width:32px;height:32px;background:var(--red);border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;letter-spacing:1px;}
.nav-title{font-size:13px;font-weight:600;color:var(--tan);letter-spacing:2px;text-transform:uppercase;}
.nav-right{display:flex;align-items:center;gap:16px;}
.nav-sync{font-size:11px;color:var(--muted);}
.refresh-btn{background:var(--red-dim);border:1px solid rgba(191,32,72,0.3);color:var(--tan);padding:5px 12px;border-radius:4px;cursor:pointer;font-size:12px;transition:all .15s;}
.refresh-btn:hover{background:rgba(191,32,72,0.3);}

.tabs{display:flex;gap:2px;padding:0 24px;background:var(--surface);border-bottom:1px solid var(--border);}
.tab{padding:12px 18px;font-size:12px;color:var(--muted);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;letter-spacing:.3px;white-space:nowrap;}
.tab:hover{color:var(--light);}
.tab.active{color:var(--tan);border-bottom-color:var(--red);}

.main{padding:20px 24px;max-width:1100px;margin:0 auto;}

.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:24px;}
.kpi{background:var(--surface);border:.5px solid var(--border);border-radius:8px;padding:14px 16px;}
.kpi.clickable{cursor:pointer;transition:border-color .15s,background .15s;}
.kpi.clickable:hover{border-color:rgba(191,32,72,0.4);background:var(--card);}
.kpi.clickable.active-filter{border-color:var(--red);background:var(--red-dim);}
.kpi-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:8px;}
.kpi-value{font-size:26px;font-weight:600;}

.filter-bar{display:flex;gap:10px;margin-bottom:20px;align-items:center;}
.search-input{background:var(--surface);border:.5px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--light);font-size:13px;flex:1;outline:none;transition:border-color .15s;}
.search-input::placeholder{color:var(--muted);}
.search-input:focus{border-color:rgba(191,32,72,0.5);}
.filter-select{background:var(--surface);border:.5px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--light);font-size:12px;outline:none;cursor:pointer;}
.filter-select option{background:var(--card);}

.month-section{margin-bottom:28px;}
.month-header{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.month-label{font-size:11px;font-weight:600;color:var(--tan);text-transform:uppercase;letter-spacing:1.5px;white-space:nowrap;}
.month-line{flex:1;height:.5px;background:var(--border);}
.month-count{font-size:11px;color:var(--muted);white-space:nowrap;}

.app-card{background:var(--card);border:.5px solid var(--border);border-radius:8px;padding:13px 15px;margin-bottom:7px;display:grid;grid-template-columns:38px 1fr auto auto;gap:12px;align-items:center;cursor:pointer;transition:border-color .15s;}
.app-card:hover{border-color:rgba(191,32,72,0.35);}
.app-card.expanded{border-color:rgba(191,32,72,0.5);}
.avatar{width:38px;height:38px;border-radius:50%;background:rgba(191,32,72,0.15);border:1px solid rgba(191,32,72,0.3);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--tan);flex-shrink:0;}
.app-name{font-size:14px;font-weight:500;color:var(--light);margin-bottom:3px;}
.app-meta{font-size:11px;color:var(--muted);}
.status-badge{font-size:10px;font-weight:600;padding:3px 10px;border-radius:20px;letter-spacing:.3px;white-space:nowrap;text-transform:capitalize;}
.status-pending{background:rgba(212,196,164,0.12);color:var(--tan);}
.status-approved{background:var(--green-dim);color:var(--green);}
.status-declined{background:var(--red-dim);color:#f07080;}
.status-other{background:rgba(255,255,255,0.07);color:var(--muted);}
.app-chevron{color:var(--muted);font-size:16px;transition:transform .2s;}
.app-chevron.open{transform:rotate(180deg);}

.app-detail{background:var(--card2);border:.5px solid rgba(191,32,72,0.2);border-radius:8px;padding:18px 20px;margin-bottom:7px;display:none;}
.app-detail.open{display:block;}
.detail-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;padding-bottom:12px;border-bottom:.5px solid var(--border);}
.detail-name{font-size:15px;font-weight:600;color:var(--light);}
.detail-meta{font-size:11px;color:var(--muted);margin-top:3px;}

.section-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin:18px 0 8px;padding-bottom:6px;border-bottom:.5px solid var(--border);}
.qa-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;}
.qa-item{padding:10px 0;border-bottom:.5px solid var(--border);}
.qa-item.full-width{grid-column:1/-1;}
.qa-q{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
.qa-a{font-size:13px;color:var(--light);line-height:1.5;word-break:break-word;}
.qa-a.yes{color:var(--green);}
.qa-a.no{color:#f07080;}

.panel{display:none;}
.panel.active{display:block;}
.analytics-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
.chart-card{background:var(--surface);border:.5px solid var(--border);border-radius:8px;padding:18px;}
.chart-title{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:14px;}
.bar-item{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.bar-label{font-size:12px;color:var(--light);min-width:110px;}
.bar-track{flex:1;height:6px;background:var(--card);border-radius:3px;overflow:hidden;}
.bar-fill{height:100%;border-radius:3px;transition:width .4s ease;}
.bar-pct{font-size:11px;color:var(--muted);min-width:32px;text-align:right;}
.chart-card.full{grid-column:1/-1;}
.trend-bars{display:flex;align-items:flex-end;gap:6px;height:100px;margin-top:12px;overflow-x:auto;padding-bottom:4px;}
.trend-col{display:flex;flex-direction:column;align-items:center;gap:5px;flex:0 0 auto;min-width:38px;}
.trend-bar{width:100%;border-radius:3px 3px 0 0;min-height:4px;}
.trend-count{font-size:10px;color:var(--tan);font-weight:600;}
.trend-label{font-size:10px;color:var(--muted);white-space:nowrap;}
.stat-divider{height:.5px;background:var(--border);margin:12px 0;}

.empty{text-align:center;padding:48px 24px;color:var(--muted);}
.empty-icon{font-size:36px;margin-bottom:12px;}
.empty-text{font-size:13px;}

.toast{position:fixed;bottom:24px;right:24px;background:var(--card);border:.5px solid var(--border);border-radius:8px;padding:12px 18px;font-size:13px;color:var(--light);z-index:999;opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none;}
.toast.show{opacity:1;transform:translateY(0);}
</style>
</head>
<body>

<script>
const CONFIG = {
  SHEET_ID:    '1721juKfdMdgEeka65ci6w6dsXqj6CDvTSBg3R3DmMUw',
  API_KEY:     'AIzaSyC8oAtzfrcsqHBwFgLih5eP5-P6OuCyVbk',
  SHEET_NAMES: ['2026', '2025', '2024'],  // ← add/remove years here
};
</script>

<div class="setup-banner" id="setup-banner">
  ⚠️ &nbsp;Fill in <code>SHEET_ID</code> and <code>API_KEY</code> in the CONFIG block.
</div>

<nav class="nav">
  <div class="nav-brand">
    <div class="nav-icon">GP</div>
    <span class="nav-title">Ghost Platoon &nbsp;&#47;&#47;&nbsp; Recruitment</span>
  </div>
  <div class="nav-right">
    <span class="nav-sync" id="last-sync"></span>
    <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
  </div>
</nav>

<div style="background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;">
  <div class="tabs" id="tab-bar"></div>
</div>

<div class="main">
  <div class="kpi-row">
    <div class="kpi clickable" id="kpi-box-total" onclick="filterByStatus('')"><div class="kpi-label">Total</div><div class="kpi-value" style="color:var(--light)" id="kpi-total">—</div></div>
    <div class="kpi clickable" id="kpi-box-pending" onclick="filterByStatus('pending')"><div class="kpi-label">Pending</div><div class="kpi-value" style="color:var(--tan)" id="kpi-pending">—</div></div>
    <div class="kpi clickable" id="kpi-box-approved" onclick="filterByStatus('approved')"><div class="kpi-label">Approved</div><div class="kpi-value" style="color:var(--green)" id="kpi-approved">—</div></div>
    <div class="kpi clickable" id="kpi-box-declined" onclick="filterByStatus('declined')"><div class="kpi-label">Declined</div><div class="kpi-value" style="color:var(--red)" id="kpi-declined">—</div></div>
    <div class="kpi"><div class="kpi-label">Other / Blank</div><div class="kpi-value" style="color:var(--muted)" id="kpi-other">—</div></div>
  </div>

  <!-- Year panels injected here by JS -->
  <div id="year-panels"></div>

  <!-- Analytics always shows all years combined -->
  <div id="panel-analytics" class="panel">
    <div class="analytics-grid">
      <div class="chart-card">
        <div class="chart-title">How applicants found us</div>
        <div id="chart-referral"></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Application outcomes</div>
        <div id="chart-outcomes"></div>
        <div class="stat-divider"></div>
        <div class="chart-title" style="margin-bottom:8px;">Yes/No gate failures</div>
        <div id="chart-gates"></div>
      </div>
      <div class="chart-card full">
        <div class="chart-title">Applications per month (all years)</div>
        <div class="trend-bars" id="trend-bars"></div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Column index map (0-based) ────────────────────────────────────────────────
const C = {
  STATUS:      1,
  TIMESTAMP:   2,
  AGE18:       3,
  ENGLISH:     4,
  N_AMERICA:   5,
  MIC:         6,
  ARMA3:       7,
  HOURS:       8,
  POLICY:      9,
  ATTEND:     10,
  INITIAL:    11,
  LAST_NAME:  12,
  AGE:        13,
  STEAM:      14,
  DISCORD:    15,
  TIMEZONE:   16,
  MILITARY:   17,
  REFERRAL:   18,
  MOS:        19,
  LOOKING:    20,
  IDEAL:      21,
  MILSIM:     22,
  ABOUT:      23,
  ELSE:       24,
  MOTHERBOARD:25,
  PROCESSOR:  26,
  RAM:        27,
  VIDEO_CARD: 28,
  INTERNET:   29,
  UNDERSTAND: 30,
};

const YESNO_COLS = new Set([C.AGE18, C.ENGLISH, C.N_AMERICA, C.MIC, C.ARMA3, C.POLICY, C.ATTEND, C.UNDERSTAND]);

// allAppsByTab: { '2026': [...], '2025': [...], ... }
let allAppsByTab = {};
let allApps = [];       // combined across all tabs
let openDetailId = null;
let activeTabKey = null;

// ── Date helpers ──────────────────────────────────────────────────────────────
function parseSheetDate(raw) {
  if (!raw) return null;
  let d = new Date(raw);
  if (!isNaN(d.getTime())) return d;
  const m = raw.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if (m) {
    d = new Date(parseInt(m[3]), parseInt(m[1]) - 1, parseInt(m[2]));
    if (!isNaN(d.getTime())) return d;
  }
  return null;
}

function formatDate(raw) {
  const d = parseSheetDate(raw);
  if (!d) return raw || '';
  return d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
}

function monthKey(raw) {
  const d = parseSheetDate(raw);
  if (!d) return null;
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}

// ── Data helpers ──────────────────────────────────────────────────────────────
function get(row, col) {
  return (row[col] || '').trim();
}

function parseStatus(raw) {
  const s = (raw || '').trim().toLowerCase();
  if (!s) return 'pending';
  if (s.includes('approv')) return 'approved';
  if (s.includes('declin') || s.includes('reject') || s.includes('denied')) return 'declined';
  return s || 'pending';
}

// ── Tab bar ───────────────────────────────────────────────────────────────────
function buildTabBar() {
  const sheets = CONFIG.SHEET_NAMES || [];
  const tabBar = document.getElementById('tab-bar');
  const yearPanels = document.getElementById('year-panels');

  // Build tab buttons (year tabs first, then Analytics)
  tabBar.innerHTML = sheets.map((name, i) =>
    `<button class="tab${i === 0 ? ' active' : ''}" id="tab-btn-${name}" onclick="switchTab('${name}', this)">${name} Applications</button>`
  ).join('') +
  `<button class="tab" id="tab-btn-analytics" onclick="switchTab('analytics', this)">Analytics</button>`;

  // Build a panel for each year
  yearPanels.innerHTML = sheets.map((name, i) => `
    <div id="panel-${name}" class="panel${i === 0 ? ' active' : ''}">
      <div class="filter-bar">
        <input type="text" class="search-input" id="search-${name}" placeholder="Search by name, Discord, referral..." oninput="renderTab('${name}')" />
        <select class="filter-select" id="status-${name}" onchange="renderTab('${name}')">
          <option value="">All statuses</option>
          <option value="pending">Pending</option>
          <option value="approved">Approved</option>
          <option value="declined">Declined</option>
        </select>
      </div>
      <div id="list-${name}"></div>
    </div>
  `).join('');

  activeTabKey = sheets[0] || null;
}

function switchTab(key, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  const panel = document.getElementById(key === 'analytics' ? 'panel-analytics' : `panel-${key}`);
  if (panel) panel.classList.add('active');
  btn.classList.add('active');
  activeTabKey = key;
  if (key !== 'analytics') updateKPIs(allAppsByTab[key] || []);
  else updateKPIs(allApps);
}

// ── Load data ─────────────────────────────────────────────────────────────────
async function loadData() {
  if (CONFIG.SHEET_ID === 'YOUR_SHEET_ID_HERE' || CONFIG.API_KEY === 'YOUR_API_KEY_HERE') {
    document.getElementById('setup-banner').style.display = 'block';
    return;
  }

  const sheets = CONFIG.SHEET_NAMES || [];
  try {
    const results = await Promise.all(sheets.map(async (sheetName) => {
      const url = `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SHEET_ID}/values/${encodeURIComponent(sheetName)}?key=${CONFIG.API_KEY}`;
      const res = await fetch(url);
      if (!res.ok) {
        const err = await res.json();
        showToast(`Error loading "${sheetName}": ${err.error?.message || res.status}`);
        return { sheetName, rows: [] };
      }
      const data = await res.json();
      return { sheetName, rows: (data.values || []).slice(1) };
    }));

    allAppsByTab = {};
    let globalIdx = 0;
    results.forEach(({ sheetName, rows }) => {
      allAppsByTab[sheetName] = rows.map(row => ({
        id: `${sheetName}_${globalIdx++}`,
        status: parseStatus(get(row, C.STATUS)),
        submittedAt: get(row, C.TIMESTAMP),
        _tab: sheetName,
        row,
      })).filter(a => get(a.row, C.INITIAL) || get(a.row, C.LAST_NAME) || get(a.row, C.DISCORD));
    });

    allApps = Object.values(allAppsByTab).flat();

    document.getElementById('last-sync').textContent =
      'Last synced ' + new Date().toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' });

    // Update KPIs for the active tab
    const activeApps = activeTabKey && activeTabKey !== 'analytics'
      ? (allAppsByTab[activeTabKey] || [])
      : allApps;
    updateKPIs(activeApps);

    // Render each year's list
    sheets.forEach(name => renderTab(name));
    renderAnalytics();
  } catch (err) {
    showToast('Failed to load sheet. Check your Sheet ID and API Key.');
    console.error(err);
  }
}

// ── KPIs ──────────────────────────────────────────────────────────────────────
function updateKPIs(apps) {
  document.getElementById('kpi-total').textContent    = apps.length;
  document.getElementById('kpi-pending').textContent  = apps.filter(a => a.status === 'pending').length;
  document.getElementById('kpi-approved').textContent = apps.filter(a => a.status === 'approved').length;
  document.getElementById('kpi-declined').textContent = apps.filter(a => a.status === 'declined').length;
  document.getElementById('kpi-other').textContent    = apps.filter(a => !['pending','approved','declined'].includes(a.status)).length;
}

// ── Display helpers ───────────────────────────────────────────────────────────
function getDisplayName(app) {
  const first = get(app.row, C.INITIAL);
  const last  = get(app.row, C.LAST_NAME);
  return (first || last) ? `${first}. ${last}` : 'Applicant';
}

function getInitials(app) {
  const first = get(app.row, C.INITIAL).replace('.','').toUpperCase();
  const last  = get(app.row, C.LAST_NAME).toUpperCase();
  return (first[0] || '?') + (last[0] || '?');
}

function statusClass(status) {
  return { pending:'status-pending', approved:'status-approved', declined:'status-declined' }[status] || 'status-other';
}

function groupByMonth(apps) {
  const groups = {};
  apps.forEach(app => {
    const d     = parseSheetDate(app.submittedAt);
    const key   = d ? `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}` : 'unknown';
    const label = d ? d.toLocaleDateString('en-US', { month:'long', year:'numeric' }) : 'Unknown Date';
    if (!groups[key]) groups[key] = { label, apps: [] };
    groups[key].apps.push(app);
  });
  return Object.entries(groups)
    .sort((a, b) => b[0].localeCompare(a[0]))
    .map(([, v]) => {
      v.apps.sort((a, b) => (parseSheetDate(b.submittedAt) || 0) - (parseSheetDate(a.submittedAt) || 0));
      return v;
    });
}

// ── Render a year tab ─────────────────────────────────────────────────────────
function renderTab(sheetName) {
  const search = (document.getElementById(`search-${sheetName}`)?.value || '').toLowerCase();
  const statusFilter = document.getElementById(`status-${sheetName}`)?.value || '';
  const apps = allAppsByTab[sheetName] || [];

  const filtered = apps
    .filter(app => {
      const name     = getDisplayName(app).toLowerCase();
      const discord  = get(app.row, C.DISCORD).toLowerCase();
      const referral = get(app.row, C.REFERRAL).toLowerCase();
      const matchSearch = !search || name.includes(search) || discord.includes(search) || referral.includes(search);
      const matchStatus = !statusFilter || app.status === statusFilter;
      return matchSearch && matchStatus;
    })
    .sort((a, b) => (parseSheetDate(b.submittedAt) || 0) - (parseSheetDate(a.submittedAt) || 0));

  const container = document.getElementById(`list-${sheetName}`);
  if (!container) return;

  if (filtered.length === 0) {
    container.innerHTML = `<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">${apps.length === 0 ? 'No data found for this tab.' : 'No applications match your filters.'}</div></div>`;
    return;
  }

  container.innerHTML = groupByMonth(filtered).map(group => `
    <div class="month-section">
      <div class="month-header">
        <span class="month-label">${group.label}</span>
        <div class="month-line"></div>
        <span class="month-count">${group.apps.length} application${group.apps.length !== 1 ? 's' : ''}</span>
      </div>
      ${group.apps.map(app => renderCard(app)).join('')}
    </div>
  `).join('');
}

function renderCard(app) {
  const name     = getDisplayName(app);
  const initials = getInitials(app);
  const date     = formatDate(app.submittedAt);
  const discord  = get(app.row, C.DISCORD);
  const referral = get(app.row, C.REFERRAL);
  const isOpen   = openDetailId === app.id;

  return `
    <div class="app-card${isOpen ? ' expanded' : ''}" onclick="toggleDetail('${app.id}','${app._tab}')">
      <div class="avatar">${initials}</div>
      <div>
        <div class="app-name">${name}</div>
        <div class="app-meta">${date}${discord ? ' &nbsp;·&nbsp; ' + discord : ''}${referral ? ' &nbsp;·&nbsp; Found via ' + referral : ''}</div>
      </div>
      <span class="status-badge ${statusClass(app.status)}">${app.status}</span>
      <span class="app-chevron${isOpen ? ' open' : ''}">▾</span>
    </div>
    ${isOpen ? `<div class="app-detail open">${renderDetail(app)}</div>` : ''}
  `;
}

function qa(label, value, full = false, col = null) {
  const isYN = col !== null && YESNO_COLS.has(col);
  const v    = value || '—';
  const cls  = isYN ? (v.toLowerCase().startsWith('y') ? 'qa-a yes' : v.toLowerCase().startsWith('n') ? 'qa-a no' : 'qa-a') : 'qa-a';
  return `<div class="qa-item${full ? ' full-width' : ''}">
    <div class="qa-q">${label}</div>
    <div class="${cls}">${v}</div>
  </div>`;
}

      </div>
      <span class="status-badge ${statusClass(app.status)}" style="font-size:12px;padding:5px 14px;">${app.status}</span>
    </div>

    <div class="section-label">Eligibility</div>
    <div class="qa-grid">
      ${qa('Over 18?',          get(r,C.AGE18),    false, C.AGE18)}
      ${qa('Fluent English?',   get(r,C.ENGLISH),  false, C.ENGLISH)}
      ${qa('North America?',    get(r,C.N_AMERICA),false, C.N_AMERICA)}
      ${qa('Working mic?',      get(r,C.MIC),      false, C.MIC)}
      ${qa('Owns Arma 3?',      get(r,C.ARMA3),    false, C.ARMA3)}

    </div>

    <div class="section-label">Personal Info</div>
    <div class="qa-grid">
      ${qa('Age',               get(r,C.AGE))}
      ${qa('Timezone',          get(r,C.TIMEZONE))}
      ${qa('Discord',           get(r,C.DISCORD))}
      ${qa('Steam Profile',     get(r,C.STEAM))}
      ${qa('Military Background', get(r,C.MILITARY), true)}
    </div>

    <div class="section-label">Application</div>
    <div class="qa-grid">
      ${qa('How they found us',          get(r,C.REFERRAL), false)}
      ${qa('MOS Preference',             get(r,C.MOS),      false)}
      ${qa('Looking for in GP',          get(r,C.LOOKING),  true)}
      ${qa('Why ideal candidate',        get(r,C.IDEAL),    true)}
      ${qa('Previous Milsim experience', get(r,C.MILSIM),   true)}

function toggleDetail(id, tabName) {
  openDetailId = openDetailId === id ? null : id;
  renderTab(tabName);
}

// ── Analytics (all years combined) ───────────────────────────────────────────
function renderAnalytics() {
  const refCounts = {};
  allApps.forEach(a => {
    const ref = get(a.row, C.REFERRAL) || 'Unknown';
    refCounts[ref] = (refCounts[ref] || 0) + 1;
  });
  renderBarChart('chart-referral',
    Object.entries(refCounts).sort((a,b) => b[1]-a[1]).slice(0,8).map(([label,count]) => ({label,count})),
    () => 'var(--red)'
  );

  renderBarChart('chart-outcomes', [
    { label:'Approved', count: allApps.filter(a => a.status==='approved').length, color:'var(--green)' },
    { label:'Pending',  count: allApps.filter(a => a.status==='pending').length,  color:'var(--tan)'   },
    { label:'Declined', count: allApps.filter(a => a.status==='declined').length, color:'var(--red)'   },
  ], d => d.color);

  const gateLabels = {
    [C.AGE18]:     'Under 18',
    [C.ENGLISH]:   'Non-English',
    [C.N_AMERICA]: 'Outside N. America',
    [C.MIC]:       'No microphone',
    [C.ARMA3]:     'No Arma 3 copy',
    [C.POLICY]:    "Won't abide policy",
    [C.ATTEND]:    "Can't attend Ops",
  };
  const gateCounts = {};
  allApps.forEach(a => {
    Object.entries(gateLabels).forEach(([col, label]) => {
      if (get(a.row, parseInt(col)).toLowerCase().startsWith('n'))
        gateCounts[label] = (gateCounts[label] || 0) + 1;
    });
  });
  const gateData = Object.entries(gateCounts).sort((a,b) => b[1]-a[1]).map(([label,count]) => ({label,count}));
  const gateEl = document.getElementById('chart-gates');
  if (gateData.length === 0) {
    gateEl.innerHTML = '<div style="font-size:12px;color:var(--muted);">No gate failures recorded.</div>';
  } else {
    const max = Math.max(...gateData.map(d => d.count));
    gateEl.innerHTML = gateData.map(d => `<div class="bar-item">
      <span class="bar-label" style="font-size:11px;">${d.label}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.round(d.count/max*100)}%;background:rgba(191,32,72,0.5);"></div></div>
      <span class="bar-pct">${d.count}</span>
    </div>`).join('');
  }

  // Trend chart — all years
  const monthCounts = {};
  allApps.forEach(a => {
    const key = monthKey(a.submittedAt);
    if (!key) return;
    if (!monthCounts[key]) {
      const d = parseSheetDate(a.submittedAt);
      monthCounts[key] = {
        label: d.toLocaleDateString('en-US', { month:'short', year:'2-digit' }),
        count: 0, key,
      };
    }
    monthCounts[key].count++;
  });

  const entries = Object.values(monthCounts).sort((a, b) => a.key.localeCompare(b.key));
  const now = new Date();
  const curKey = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const max = Math.max(...entries.map(e => e.count), 1);
  const trendEl = document.getElementById('trend-bars');

  if (entries.length === 0) {
    trendEl.innerHTML = '<div style="font-size:12px;color:var(--muted);align-self:center;">No dated applications found.</div>';
    return;
  }

  trendEl.innerHTML = entries.map(m => {
    const h   = Math.max(Math.round(m.count / max * 80), m.count > 0 ? 8 : 3);
    const cur = m.key === curKey;
    return `<div class="trend-col">
      <span class="trend-count" style="${m.count > 0 ? '' : 'visibility:hidden;'}">${m.count}</span>
      <div class="trend-bar" style="height:${h}px;background:${cur ? 'var(--red)' : 'rgba(191,32,72,0.4)'};" title="${m.count} application${m.count!==1?'s':''}"></div>
      <span class="trend-label" style="${cur ? 'color:var(--tan);font-weight:600;' : ''}">${m.label}</span>
    </div>`;
  }).join('');
}

function renderBarChart(id, data, colorFn) {
  const el = document.getElementById(id);
  if (!el) return;
  const total = data.reduce((s,d) => s+d.count, 0);
  if (total === 0) { el.innerHTML='<div style="font-size:12px;color:var(--muted);">No data yet.</div>'; return; }
  el.innerHTML = data.map(d => {
    const pct = Math.round(d.count/total*100);
    return `<div class="bar-item">
      <span class="bar-label">${d.label}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${colorFn(d)};"></div></div>
      <span class="bar-pct">${pct}%</span>
    </div>`;
  }).join('');
}

function filterByStatus(status) {
  // Only works on year tabs, not analytics
  if (!activeTabKey || activeTabKey === 'analytics') return;

  // Update the dropdown for the active tab
  const select = document.getElementById(`status-${activeTabKey}`);
  if (!select) return;

  // Toggle off if already active
  if (select.value === status && status !== '') {
    select.value = '';
    status = '';
  } else {
    select.value = status;
  }

  // Highlight the active KPI box
  ['total','pending','approved','declined'].forEach(k => {
    const box = document.getElementById(`kpi-box-${k}`);
    if (box) box.classList.remove('active-filter');
  });
  if (status === '') {
    document.getElementById('kpi-box-total')?.classList.add('active-filter');
  } else {
    document.getElementById(`kpi-box-${status}`)?.classList.add('active-filter');
  }

  renderTab(activeTabKey);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 4000);
}

// ── Init ──────────────────────────────────────────────────────────────────────
buildTabBar();
loadData();
setInterval(loadData, 2 * 60 * 1000);
</script>
